    />

      crossorigin="anonymous"

    <title>Document</title>
  </head>

  <body>
    <table class="table table-bordered table-striped">
      <tr>
        <th><i class="fas fa-hashtag"></i> ID</th>
        <th><i class="fas fa-bug"></i> Issue</th>
        <th><i class="fas fa-calender"></i> Date</th>
        <th><i class="fas fa-sort-amount-down"></i> Level</th>
        <th><i class="fas fa-user"></i> Assign</th>
      </tr>
      <tr>
        <td>1</td>
        <td>A problem with something</td>
        <td>2023-10-01</td>
        <td><span class="badge bg-danger">Critical</span></td>
        <td>Alice</td>
      </tr>
      <tr>
        <td>2</td>
        <td>Another problem with something</td>
        <td>2023-10-02</td>
        <td><span class="badge bg-warning">Important</span></td>
        <td>Bob</td>
      </tr>
    </table>
  </body>
</html>
