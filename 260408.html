<html>
  <head></head>
  <body>
    <canvas
      id="canvas1"
      width="400"
      height="300"
      style="border: 1px solid #000000"
    ></canvas>
    <script>
      var c = document.getElementById("canvas1");
      var ctx = c.getContext("2d");
      ctx.font = "bold 22px Tahoma";
      ctx.textAlign = "start";
      ctx.fillText("start", 10, 30);
      ctx.translate(100, 150);
      ctx.fillText("after Translate", 10, 30);
      ctx.rotate((Math.PI / 180) * 30);
      ctx.fillText("after Rotate", 10, 30);
      ctx.scale(3, 3);
      ctx.fillText("after Scale", 10, 30);
    </script>
    <form autocomplete="off">
      <label for="e-mail">Your e-mail address: </label>
      <input name="Email" type="text" required />
      <input type="submit" value="Submit" />
      <input id="mysearch" name="searchitem" type="search" />
      <input id="car" type="text" list="colors" />
      <datalist id="colors">
        <option value="Red"></option>
        <option value="Green"></option>
        <option value="Yellow"></option>
      </datalist>
      <input
        id="email"
        name="email"
        type="email"
        placeholder="example@example.com"
      />
      <br />
      <input id="url" name="url" type="url" placeholder="example.com" />
      <br />
      <input id="tel" name="tel" type="tel" placeholder="555.555.1211" />
      <svg width="100" height="100">
        <line x1="50" y1="0" x2="50" y2="100" style="stroke: black" />
        <line x1="0" y1="50" x2="100" y2="50" style="stroke: black" />
      </svg>
    </form>
  </body>
</html>
