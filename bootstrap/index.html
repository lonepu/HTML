<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap & Google Fonts Example</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        /* Google Font ကို တစ်ကိုယ်လုံးစာ သတ်မှတ်တာပါ */
        font-family: "Noto Sans Myanmar", sans-serif;
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      /* ကိုယ်ပိုင် Custom Card Style */
      .my-custom-card {
        border-radius: 15px;
        overflow: hidden;
        transition: transform 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .my-custom-card:hover {
        transform: translateY(
          -10px
        ); /* Mouse တင်ရင် အပေါ် နည်းနည်းတက်သွားအောင် */
      }

      .btn-custom {
        background-color: #6c5ce7;
        color: white;
        border-radius: 20px;
      }
    </style>
  </head>
  <body>
    <div class="card bg-primary text-light">
      <div class="card-header">
        <strong>Card Title</strong>
      </div>
      <div class="card-body">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Id iste,
        officiis, possimus facere nostrum voluptates temporibus eos consequuntur
        eaque similique fugiat quisquam, a debitis est quia soluta voluptate
        quasi doloremque.
      </div>
      <ul class="list-group list-group-flush">
        <li class="list-group-item">Item One</li>
        <li class="list-group-item">Item Two</li>
        <li class="list-group-item">Item Three</li>
      </ul>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
